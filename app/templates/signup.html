{% extends "base.html" %}

{% block title %}DevFolio · 회원가입{% endblock %}

{% block extra_head %}
  <style>
    /* --- [기존 고퀄리티 CSS 유지] --- */
    .auth-wrap {
      max-width: 420px;
      margin: 40px auto 0;
    }

    .auth-card {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 40px -5px rgba(0,0,0,0.08);
      padding: 32px 28px;
    }

    .auth-header {
      margin-bottom: 20px;
      text-align: center;
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
    }

    .auth-sub {
      margin: 0;
      font-size: 14px;
      color: #64748b;
      line-height: 1.5;
    }

    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f0fdf4; /* 가입은 초록색 느낌 */
      color: #15803d;
      font-size: 12px;
      font-weight: 600;
    }

    .auth-badge-dot {
      width: 6px; height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }

    .auth-form {
      margin-top: 20px;
      display: grid;
      gap: 16px;
    }

    .auth-field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    .auth-field input[type="text"],
    .auth-field input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      transition: all 0.2s;
    }

    .auth-field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
    }

    .auth-hint {
      margin-top: 4px;
      font-size: 12px;
      color: #94a3b8;
    }

    .auth-error {
      margin-top: 4px;
      padding: 10px;
      border-radius: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      font-size: 13px;
      color: #b91c1c;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #f9fafb;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
      transition: all 0.2s;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .auth-footer {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
      font-size: 13px;
      color: #64748b;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .auth-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
{% endblock %}

{% block content %}
  <div class="auth-wrap">
    <section class="auth-card">
      <header class="auth-header">
        <h1 class="auth-title">회원가입</h1>
        <p class="auth-sub">
          DevFolio에서 나만의 포트폴리오를 관리하세요.
        </p>
        <div class="auth-badge">
          <span class="auth-badge-dot"></span>
          <span>간편 가입: 아이디와 비밀번호만 필요합니다.</span>
        </div>
      </header>

      <form class="auth-form" method="post" action="/signup">
        <div class="auth-field">
          <label for="username">아이디</label>
          <input
            id="username"
            type="text"
            name="username"
            placeholder="사용할 아이디 입력"
            required
          />
        </div>

        <div class="auth-field">
          <label for="password">비밀번호</label>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="비밀번호 입력"
            required
          />
        </div>

        <div class="auth-field">
          <label for="password_confirm">비밀번호 확인</label>
          <input
            id="password_confirm"
            type="password"
            name="password_confirm"
            placeholder="비밀번호 재입력"
            required
          />
          <div class="auth-hint">
            비밀번호를 한 번 더 정확하게 입력해 주세요.
          </div>
        </div>

        {% if error %}
          <div class="auth-error">
            ⚠️ {{ error }}
          </div>
        {% endif %}

        <div style="margin-top:10px;">
          <button class="btn-primary" type="submit">가입 완료</button>
        </div>
      </form>

      <div class="auth-footer">
        <span>이미 계정이 있으신가요?</span>
        <a href="/login">로그인하기</a>
      </div>
    </section>
  </div>
{% endblock %}
