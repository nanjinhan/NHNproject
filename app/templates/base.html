<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}DevFolio · AI Portfolio{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary-600: #2563eb;
      --primary-700: #1d4ed8;
      --slate-900: #0f172a;
      --slate-600: #475569;
      --slate-500: #64748b;
      --slate-50: #f8fafc;
      --bg-gradient: radial-gradient(circle at 0 0, #eff6ff 0, transparent 55%), radial-gradient(circle at 100% 0, #f0fdf4 0, transparent 55%), #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
      background: var(--bg-gradient);
      color: var(--slate-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* --- [Navigation] --- */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 32px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }

    .brand-text-main { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .brand-text-sub  { font-size: 12px; color: var(--slate-500); margin-top: 2px; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      font-size: 15px;
      font-weight: 600;
      color: var(--slate-500);
    }

    .nav-links a { transition: color 0.2s; position: relative; }
    .nav-links a:hover { color: var(--slate-900); }

    .nav-login {
      padding: 10px 20px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      color: var(--slate-900);
      transition: all 0.2s;
    }

    .nav-login:hover {
      border-color: var(--primary-600);
      color: var(--primary-600);
      box-shadow: 0 4px 12px rgba(37,99,235,0.1);
    }

    .nav-user { font-size: 14px; color: var(--slate-900); font-weight: 700; }

    /* --- [Main Content] --- */
    .content-wrap {
      flex: 1;
      position: relative;
    }

    /* --- [Footer] --- */
    .footer {
      margin-top: 100px;
      padding: 32px 0;
      border-top: 1px solid #e2e8f0;
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="nav">
      <a href="/" class="brand">
        <div class="brand-mark">DF</div>
        <div>
          <div class="brand-text-main">DevFolio</div>
          <div class="brand-text-sub">AI Career Platform</div>
        </div>
      </a>
      <nav class="nav-links">
        <a href="/">메인</a>
        
        <a href="/board">커뮤니티</a>
        <a href="/gallery" style="color:#2563eb;">AI 인터뷰</a>

        {% if user %}
          <span class="nav-user">{{ user }}님</span>
          <a class="nav-login" href="/logout">로그아웃</a>
        {% else %}
          <a class="nav-login" href="/login">로그인</a>
        {% endif %}
      </nav>
    </header>

    <main class="content-wrap">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>© 2025 DevFolio Team. All rights reserved.</span>
      <span>Powered by GitHub API & HCX LLM</span>
    </footer>
  </div>
</body>
</html>
