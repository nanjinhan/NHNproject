{% extends "base.html" %}

{% block title %}DevFolio · AI Studio{% endblock %}

{% block extra_head %}
  <style>
    /* --- [기존 스타일 유지] --- */
    body { background: linear-gradient(180deg, #f8fafc 0%, #eff6ff 100%); min-height: 100vh; }
    .studio-wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 140px; }

    /* Stage 1 */
    #setup-stage { background: #ffffff; padding: 40px; border-radius: 24px; box-shadow: 0 20px 60px -10px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; animation: slideUp 0.5s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .setup-title { font-size: 24px; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
    .setup-desc { font-size: 15px; color: #64748b; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 15px; background: #f8fafc; transition: all 0.2s; }
    .form-input:focus { outline: none; border-color: #2563eb; background: #fff; }
    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-chip { padding: 8px 16px; border-radius: 99px; border: 1px solid #e2e8f0; background: #ffffff; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none; }
    .tag-chip:hover { background: #f1f5f9; }
    .tag-chip.selected { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 4px 10px rgba(37,99,235,0.3); }
    .btn-start { width: 100%; padding: 16px; margin-top: 20px; background: #0f172a; color: white; font-size: 16px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; transition: transform 0.2s; }
    .btn-start:hover { transform: translateY(-2px); background: #1e293b; }

    /* Stage 2 */
    #chat-stage { display: none; opacity: 0; transition: opacity 0.5s; }
    .chat-container { display: flex; flex-direction: column; gap: 24px; padding-bottom: 20px; }
    .chat-bubble { display: flex; gap: 16px; opacity: 0; transform: translateY(20px); animation: message-in 0.5s forwards cubic-bezier(0.25, 1, 0.5, 1); }
    @keyframes message-in { to { opacity: 1; transform: translateY(0); } }
    .ai-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #7c3aed); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 13px; box-shadow: 0 4px 12px rgba(37,99,235,0.25); flex-shrink: 0; }
    .ai-message { background: #ffffff; padding: 18px 24px; border-radius: 4px 24px 24px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #e2e8f0; color: #1e293b; font-size: 16px; line-height: 1.6; max-width: 85%; }
    .chat-bubble.user { flex-direction: row-reverse; }
    .chat-bubble.user .user-message { background: #2563eb; color: #ffffff; padding: 14px 22px; border-radius: 24px 4px 24px 24px; box-shadow: 0 8px 20px rgba(37,99,235,0.2); font-size: 16px; line-height: 1.5; max-width: 80%; }
    .typing { display: none; margin-left: 60px; padding: 12px 20px; background: rgba(255,255,255,0.6); border: 1px solid #e2e8f0; border-radius: 24px; width: fit-content; gap: 6px; }
    .dot { width: 8px; height: 8px; background: #94a3b8; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Dock */
    .input-dock-wrap { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 20px; z-index: 100; display: none; }
    .input-dock { width: 100%; max-width: 720px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); padding: 8px; border-radius: 20px; border: 1px solid #cbd5e1; box-shadow: 0 20px 50px -10px rgba(0,0,0,0.15); display: flex; gap: 10px; transition: transform 0.2s; }
    .input-dock:focus-within { transform: translateY(-5px); border-color: #2563eb; }
    .dock-input { flex: 1; border: none; background: transparent; padding: 14px 24px; font-size: 16px; outline: none; color: #0f172a; }
    .dock-btn { width: 50px; height: 50px; border-radius: 16px; border: none; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .dock-btn:hover { background: #2563eb; }

    /* --- [NEW] 전체 화면 로딩 오버레이 --- */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: none; /* JS로 켬 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .loader-circle {
      width: 60px; height: 60px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .loading-text { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 8px; }
    .loading-sub { font-size: 14px; color: #64748b; }
  </style>
{% endblock %}

{% block content %}
<div class="studio-wrap">

  <div id="setup-stage">
    <h2 class="setup-title">기본 프로필 설정</h2>
    <p class="setup-desc">포트폴리오 생성을 위해 기초 정보를 입력해주세요.</p>
    <div class="form-group">
      <label class="form-label">이름 (Name)</label>
      <input type="text" id="info-name" class="form-input" placeholder="예: 홍길동">
    </div>
    <div class="form-group">
      <label class="form-label">전공 (Major)</label>
      <input type="text" id="info-major" class="form-input" placeholder="예: 소프트웨어공학부, 인공지능학부">
    </div>
    <div class="form-group">
      <label class="form-label">이메일 (Email)</label>
      <input type="email" id="info-email" class="form-input" placeholder="contact@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">관심 분야 태그</label>
      <div class="tag-container">
        <div class="tag-chip" onclick="toggleTag(this)">BackEnd</div>
        <div class="tag-chip" onclick="toggleTag(this)">FrontEnd</div>
        <div class="tag-chip" onclick="toggleTag(this)">AI/ML</div>
        <div class="tag-chip" onclick="toggleTag(this)">DevOps</div>
        <div class="tag-chip" onclick="toggleTag(this)">Mobile</div>
        <div class="tag-chip" onclick="toggleTag(this)">Security</div>
        <div class="tag-chip" onclick="toggleTag(this)">Data</div>
      </div>
    </div>
    <button class="btn-start" onclick="startInterview()">정보 입력 완료 & AI 인터뷰 시작 →</button>
  </div>

  <div id="chat-stage">
    <div class="chat-container" id="chat-box"></div>
    <div class="typing" id="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <form id="final-form" action="/profileGen/generate" method="post" style="display:none;">
    <input type="hidden" name="base_name" id="d-name">
    <input type="hidden" name="base_major" id="d-major">
    <input type="hidden" name="base_email" id="d-email">
    <input type="hidden" name="base_tags" id="d-tags">
    <input type="hidden" name="answer_intro" id="d-intro">
    <input type="hidden" name="answer_value" id="d-value">
    <input type="hidden" name="github_id" id="d-github">
  </form>

</div>

<div class="input-dock-wrap" id="input-area">
  <div class="input-dock">
    <input type="text" id="user-input" class="dock-input" placeholder="답변을 입력하세요..." autocomplete="off">
    <button id="send-btn" class="dock-btn">➤</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="loader-circle"></div>
  <div class="loading-text" id="loading-msg">AI Analyzing...</div>
  <div class="loading-sub">GitHub 코드와 인터뷰 내용을 분석 중입니다.</div>
</div>

<script>
  // --- [Stage 1] ---
  let selectedTags = [];
  function toggleTag(el) {
    el.classList.toggle('selected');
    const val = el.innerText;
    selectedTags.includes(val) ? selectedTags = selectedTags.filter(t=>t!==val) : selectedTags.push(val);
  }

  function startInterview() {
    const name = document.getElementById('info-name').value;
    const major = document.getElementById('info-major').value;
    const email = document.getElementById('info-email').value;
    if (!name || !major || !email) return alert("모든 정보를 입력해주세요.");
    if (selectedTags.length === 0) return alert("태그를 선택해주세요.");

    document.getElementById('d-name').value = name;
    document.getElementById('d-major').value = major;
    document.getElementById('d-email').value = email;
    document.getElementById('d-tags').value = selectedTags.join(',');

    document.getElementById('setup-stage').style.display = 'none';
    const chatStage = document.getElementById('chat-stage');
    chatStage.style.display = 'block';
    setTimeout(() => { chatStage.style.opacity = '1'; }, 50);
    document.getElementById('input-area').style.display = 'flex';

    setTimeout(() => {
      addAiMessage(`반갑습니다, <strong>${name}</strong>님! 👋<br>기본 정보는 확인되었습니다.<br><br>이제 포트폴리오를 위해 <strong>간단한 자기소개</strong>를 부탁드려요!`);
    }, 600);
  }

  // --- [Stage 2] ---
  const questions = [
    "좋습니다! ✨<br>개발자로서 가장 중요하게 생각하는 <strong>가치관</strong>이나 <strong>철학</strong>이 있나요?",
    "마지막입니다. 분석할 <strong>GitHub ID</strong>를 입력해주세요!"
  ];
  let step = 0;
  const answers = { intro:"", value:"", github:"" };

  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const typingDots = document.getElementById('typing-dots');

  function addAiMessage(html) {
    const div = document.createElement('div');
    div.className = 'chat-bubble';
    div.innerHTML = `<div class="ai-avatar">AI</div><div class="ai-message">${html}</div>`;
    chatBox.appendChild(div);
    scrollToBottom();
  }

  function addUserMessage(text) {
    const div = document.createElement('div');
    div.className = 'chat-bubble user';
    div.innerHTML = `<div class="user-message">${text}</div>`;
    chatBox.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  async function handleChat() {
    const text = userInput.value.trim();
    if(!text) return;

    addUserMessage(text);
    userInput.value = '';
    userInput.disabled = true;
    sendBtn.disabled = true;

    typingDots.style.display = 'flex';
    scrollToBottom();

    if (step < questions.length) {
        if(step === 0) answers.intro = text;
        else if(step === 1) answers.value = text;

        setTimeout(() => {
            typingDots.style.display = 'none';
            addAiMessage(questions[step]);
            step++;
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }, 1000);
    } else {
        // [마지막] ID 검증
        try {
            const formData = new FormData();
            formData.append('github_id', text);
            
            const res = await fetch('/gallery/check_github', { method: 'POST', body: formData });
            const result = await res.json();
            
            typingDots.style.display = 'none';

            if (result.exists) {
                answers.github = text;
                addAiMessage(`<strong>${text}</strong> 계정 확인 완료! ✅<br>잠시만 기다려주세요. 포트폴리오를 생성 중입니다...`);
                
                document.getElementById('d-intro').value = answers.intro;
                document.getElementById('d-value').value = answers.value;
                document.getElementById('d-github').value = answers.github;
                
                document.getElementById('input-area').style.display = 'none';

                // [핵심] 로딩 화면 띄우기
                startLoadingSequence();

                // 5초 뒤 전송 (페이지 이동)
                setTimeout(() => {
                    document.getElementById('final-form').submit();
                }, 5000);
            } else {
                addAiMessage(`음, <strong>${text}</strong> 계정을 찾을 수 없네요. 😅<br>오타가 없는지 확인하고 다시 입력해 주시겠어요?`);
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        } catch (err) {
            console.error(err);
            typingDots.style.display = 'none';
            addAiMessage("서버 오류입니다. 잠시 후 다시 시도해주세요.");
            userInput.disabled = false;
            sendBtn.disabled = false;
        }
    }
  }

  // 로딩 멘트가 바뀌는 효과 함수
  function startLoadingSequence() {
    const overlay = document.getElementById('loading-overlay');
    const msg = document.getElementById('loading-msg');
    overlay.style.display = 'flex'; // 화면 덮기

    const messages = [
      "Connecting to GitHub API...",
      "Analyzing Repository Data...",
      "Extracting Tech Stack...",
      "Generating AI Profile...",
      "Finalizing Portfolio..."
    ];
    let i = 0;
    
    // 1초초마다 멘트 변경
    setInterval(() => {
      if(i < messages.length) {
        msg.textContent = messages[i++];
      }
    }, 1000);
  }

  sendBtn.addEventListener('click', handleChat);
  userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleChat(); });
</script>
{% endblock %}
