{% extends "base.html" %}

{% block title %}DevFolio · 로그인{% endblock %}

{% block extra_head %}
  <style>
    /* --- [기존 고퀄리티 CSS 유지] --- */
    .login-wrap {
      max-width: 420px;
      margin: 40px auto 0;
    }

    .login-title {
      margin-bottom: 16px;
      text-align: center;
    }

    .login-title h1 {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 6px;
    }

    .login-title p {
      margin: 0;
      font-size: 14px;
      color: #64748b;
    }

    .login-card {
      margin-top: 12px;
      padding: 32px 28px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 40px -5px rgba(0,0,0,0.08);
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .login-badge-dot {
      width: 6px; height: 6px;
      border-radius: 999px;
      background: #3b82f6;
    }

    .login-form {
      display: grid;
      gap: 16px;
      margin-top: 8px;
    }

    .login-field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 6px;
    }

    .login-field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      transition: all 0.2s;
    }

    .login-field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
    }

    .login-hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .login-error {
      margin-top: 4px;
      padding: 10px;
      border-radius: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      font-size: 13px;
      color: #b91c1c;
      font-weight: 500;
    }

    .login-actions {
      margin-top: 10px;
    }

    .login-actions button[type="submit"] {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #f9fafb;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
      transition: all 0.2s;
    }

    .login-actions button[type="submit"]:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .login-footer {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .login-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .login-footer a:hover { text-decoration: underline; }
  </style>
{% endblock %}

{% block content %}
  <div class="login-wrap">
    <header class="login-title">
      <h1>로그인</h1>
      <p>DevFolio 계정으로 포트폴리오 스튜디오에 접속합니다.</p>
    </header>

    <section class="login-card">
      <div class="login-badge">
        <span class="login-badge-dot"></span>
        <span>DevFolio Member Access</span>
      </div>

      <form class="login-form" method="post" action="/login">
        <div class="login-field">
          <label for="username">아이디</label>
          <input
            id="username"
            type="text"
            name="username"
            autocomplete="username"
            placeholder="아이디를 입력하세요"
          />
        </div>

        <div class="login-field">
          <label for="password">비밀번호</label>
          <input
            id="password"
            type="password"
            name="password"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
          />
          <div class="login-hint">
            팀 공용 계정 또는 개인 계정으로 로그인해 주세요.
          </div>
        </div>

        {% if error %}
          <div class="login-error">
            ⚠️ {{ error }}
          </div>
        {% endif %}

        <div class="login-actions">
          <button type="submit">로그인하기</button>
        </div>
      </form>

      <div class="login-footer">
        <span>아직 계정이 없으신가요?</span>
        <a href="/signup">회원가입</a>
      </div>
    </section>
  </div>
{% endblock %}
